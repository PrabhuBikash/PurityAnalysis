<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Core Perfect Numbers</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Core Perfect Numbers</h1>

  <div class="controls">
    <div class="field"><label>Seed(n)</label><input id="funcInput" value="(n+1)>>1"></div>
    <div class="field"><label>Property(n)</label><input id="propInput" value="n%2"></div>
    <div class="field"><label>Threshold(n)</label><input id="thresholdInput" value="n"></div>
    <div class="controls">
      <div class="field"><label>From</label><input id="fromInput" type="number" value="1"></div>
      <div class="field"><label>To</label><input id="toInput" type="number" value="50"></div>
      <div class="field"><label>Gap</label><input id="gapInput" type="number" value="1"></div>
      <div class="field"><label>Max Iter</label><input id="maxIterInput" type="number" value="500"></div>
    </div>
    <button id="startBtn">Start Searching</button>
  </div>

  <div class="output" id="output"></div>
  <div class="time" id="time"></div>
</div>

<script src="script.js"></script>

</body>
</html>
